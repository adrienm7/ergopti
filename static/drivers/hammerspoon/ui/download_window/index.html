<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<title>Téléchargement en cours</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h2>📥 Téléchargement en cours</h2>
		<div id="model">—</div>

		<div id="model-sizes" style="display: none">
			<span id="sz-dl"></span>
			<span id="sz-ram"></span>
		</div>

		<div id="bar-bg">
			<div id="bar-fill"></div>
		</div>

		<div id="status-line">
			<div id="pct">0 %</div>
			<div
				id="file-count"
				style="
					display: none;
					margin-left: 12px;
					color: #cdd;
					font-family: 'SF Mono', monospace;
					font-size: 13px;
					font-weight: 600;
				"
			></div>
		</div>

		<div id="stats">
			<div id="stats-details" style="display: none"></div>
			<div id="eta-container" style="display: none; margin-top: 4px">
				⏳ Temps restant : <b id="eta" style="color: #fff"></b>
			</div>
			<div id="done-msg"></div>
			<div id="stats-fallback">Démarrage…</div>
		</div>

		<div class="btn-row">
			<button id="btn-cancel" onclick="doCancel()">🛑 Annuler</button>
			<button id="btn-term" onclick="doTerm()">🖥 Terminal</button>
			<button id="btn-retry" onclick="doRetry()" style="display: none">
				🔄 Relancer le téléchargement
			</button>
		</div>

		<div id="log-area"></div>

		<script src="script.js"></script>
	</body>
</html>

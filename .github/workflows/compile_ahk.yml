name: Compile ErgoptiPlus AHK

on:
    push:
        branches: ["main"]
        paths:
            - "static/drivers/autohotkey/**/*.ahk"
            - "static/drivers/hotstrings/*.toml"
            - "tools/compile_hotstrings.py"

    # Permet de lancer manuellement depuis l'onglet Actions
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: compile-ahk-${{ github.ref }}
    cancel-in-progress: true

jobs:
    compile:
        if: ${{ github.actor != 'github-actions[bot]' }}
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.PAT_ERGOPTI }}
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Regenerate hotstrings_generated.ahk from TOML
              # Keep the generated file in sync with the bundled TOMLs. The
              # .ahk output is committed so local dev builds do not require
              # Python, but CI always regenerates to catch forgotten updates.
              run: python tools/compile_hotstrings.py
              shell: bash

            - name: Download AutoHotkey v2 runtime and Ahk2Exe
              run: |
                  # AHK v2 runtime (contains AutoHotkey64.exe needed by Ahk2Exe)
                  Invoke-WebRequest -Uri "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19.zip" -OutFile "$env:TEMP\AHK.zip" -UseBasicParsing
                  Expand-Archive -Path "$env:TEMP\AHK.zip" -DestinationPath "$env:TEMP\AutoHotkey" -Force
                  # Ahk2Exe compiler (separate repo/release)
                  gh release download --repo AutoHotkey/Ahk2Exe --pattern "*.zip" --dir "$env:TEMP\Ahk2ExeZip"
                  $z = Get-ChildItem "$env:TEMP\Ahk2ExeZip" -Filter "*.zip" | Select-Object -First 1
                  Expand-Archive -Path $z.FullName -DestinationPath "$env:TEMP\Ahk2Exe" -Force
              shell: pwsh
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Compile ErgoptiPlus.ahk
              run: |
                  $ahk2exe  = Get-ChildItem "$env:TEMP\Ahk2Exe" -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1 -ExpandProperty FullName
                  $runtime  = Get-ChildItem "$env:TEMP\AutoHotkey" -Filter "AutoHotkey64.exe" | Select-Object -First 1 -ExpandProperty FullName
                  Write-Host "Ahk2Exe  : $ahk2exe"
                  Write-Host "Runtime  : $runtime"
                  $in   = "${{ github.workspace }}\static\drivers\autohotkey\ErgoptiPlus.ahk"
                  $out  = "${{ github.workspace }}\static\drivers\autohotkey\ErgoptiPlus.exe"
                  $icon = "${{ github.workspace }}\static\favicon.ico"
                  & $ahk2exe /in $in /out $out /base $runtime /icon $icon
                  if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              shell: pwsh

            - name: Commit compiled EXE and auto-merge PR
              run: |
                  set -euo pipefail
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add static/drivers/autohotkey/ErgoptiPlus.exe
                  git add static/drivers/autohotkey/lib/hotstrings_generated.ahk
                  if git diff --cached --quiet; then
                    echo "No changes to commit"
                    exit 0
                  fi
                  datetime="$(date '+%Y-%m-%d %H:%M')"
                  git commit -m "ci: recompile ErgoptiPlus.exe [$datetime]"
                  git checkout -B ci/recompile-exe
                  git push origin ci/recompile-exe --force
                  EXISTING_PR=$(gh pr list --head ci/recompile-exe --base "$GITHUB_REF_NAME" --json number --jq '.[0].number')
                  if [ -n "$EXISTING_PR" ]; then
                    echo "Reusing existing PR #$EXISTING_PR"
                    PR_NUMBER="$EXISTING_PR"
                  else
                    PR_URL=$(gh pr create \
                      --base "$GITHUB_REF_NAME" \
                      --head ci/recompile-exe \
                      --title "ci: recompile ErgoptiPlus.exe" \
                      --body "Automated recompilation triggered by a change to \`ErgoptiPlus.ahk\`.")
                    echo "PR created: $PR_URL"
                    PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
                  fi
                  gh pr merge "$PR_NUMBER" --squash --admin --delete-branch
                  # Explicit fallback: delete remote branch even if --delete-branch
                  # did not fire (e.g. PAT vs GITHUB_TOKEN discrepancy).
                  git push origin --delete ci/recompile-exe || true
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.PAT_ERGOPTI }}

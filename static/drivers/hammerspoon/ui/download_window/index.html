<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<title>Téléchargement en cours</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h2>📥 Téléchargement en cours</h2>
		<div id="model">—</div>

		<div id="model-sizes" style="display: none">
			<span id="sz-dl"></span>
			<span id="sz-ram"></span>
		</div>

		<div id="bar-bg">
			<div id="bar-fill"></div>
		</div>

		<div id="status-line">
			<div id="pct">0 %</div>
			<div
				id="file-count"
				style="
					display: none;
					margin-left: 8px;
					color: #cdd;
					font-family: 'SF Mono', monospace;
					font-size: 12px;
				"
			></div>
			<div id="done-msg"></div>
		</div>
		<div id="stats">
			<div id="speed-eta" style="display: none">
				Vitesse : <b id="speed"></b><span class="gap"></span>—<span class="gap"></span>Temps restant
				: <b id="eta"></b>
			</div>
			<div id="files-line" style="display: none">
				📁
				<span id="file-stats">
					<span id="file-current"></span>
					<span class="sep">/</span>
					<span id="file-total"></span> fichiers
				</span>
			</div>
			<div id="stats-fallback">Démarrage…</div>
		</div>

		<div class="btn-row">
			<button id="btn-cancel" onclick="doCancel()">🛑 Annuler</button>
			<button id="btn-term" onclick="doTerm()">🖥 Terminal</button>
			<button id="btn-retry" onclick="doRetry()" style="display: none">
				🔄 Relancer le téléchargement
			</button>
		</div>

		<div id="log-area"></div>

		<script src="script.js"></script>
	</body>
</html>

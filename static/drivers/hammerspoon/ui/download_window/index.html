<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<title>Progression</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div id="accent-stripe"></div>

		<div id="ui-controls">
			<div class="header-group">
				<h2 id="title">📥 Téléchargement en cours</h2>
				<div id="model">—</div>
				<div id="subtitle"></div>
			</div>

			<div class="progress-group">
				<div id="status-line">
					<div id="pct">0 %</div>
					<div id="done-msg"></div>
					<div id="file-count" style="display: none"></div>
				</div>

				<div id="bar-bg">
					<div id="bar-fill"></div>
				</div>

				<div id="stats">
					<div id="stats-details" style="display: none"></div>
					<div id="eta-container" style="display: none">⏳ Temps restant : <b id="eta"></b></div>
					<div id="stats-fallback">Démarrage…</div>
				</div>
			</div>

			<div id="bootstrap-group">
				<div id="step-line">Préparation…</div>
				<div id="detail-line"></div>
				<div id="bootstrap-bar-bg">
					<div id="bootstrap-bar-fill"></div>
				</div>
			</div>

			<div class="btn-row">
				<button id="btn-cancel" onclick="doCancel()">🛑 Annuler</button>
				<button id="btn-term" onclick="doTerm()">🖥 Terminal</button>
				<button id="btn-retry" onclick="doRetry()" style="display: none">
					🔄 Relancer le téléchargement
				</button>
			</div>
		</div>

		<div id="log-area"></div>

		<script src="script.js"></script>
	</body>
</html>

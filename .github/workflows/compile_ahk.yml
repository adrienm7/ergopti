name: Compile ErgoptiPlus AHK

on:
    push:
        branches: ["main", "dev"]
        paths:
            - "static/drivers/autohotkey/ErgoptiPlus.ahk"

    # Permet de lancer manuellement depuis l'onglet Actions
    workflow_dispatch:

permissions:
    contents: write

jobs:
    compile:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install AutoHotkey v2
              run: choco install autohotkey --version=2.0.19 -y
              shell: pwsh

            - name: Compile ErgoptiPlus.ahk
              run: |
                  # Try to find Ahk2Exe in PATH or common Program Files locations
                  $ahk2exe = (Get-Command -Name Ahk2Exe.exe -ErrorAction SilentlyContinue)?.Source
                  if (-not $ahk2exe) {
                    $candidates = Get-ChildItem -Path 'C:\Program Files','C:\Program Files (x86)' -Recurse -ErrorAction SilentlyContinue -Filter 'Ahk2Exe.exe' | Select-Object -First 1
                    if ($candidates) { $ahk2exe = $candidates.FullName }
                  }
                  if (-not $ahk2exe) {
                    Write-Error "Ahk2Exe.exe not found after installing AutoHotkey. Listing Program Files for debugging:"
                    Get-ChildItem -Path 'C:\Program Files','C:\Program Files (x86)' -Recurse -ErrorAction SilentlyContinue -Include '*AutoHotkey*' | Select-Object -First 50
                    exit 1
                  }
                  Write-Host "Using Ahk2Exe at: $ahk2exe"
                  $input   = "${{ github.workspace }}\static\drivers\autohotkey\ErgoptiPlus.ahk"
                  $output  = "${{ github.workspace }}\static\drivers\autohotkey\ErgoptiPlus.exe"
                  $icon    = "${{ github.workspace }}\static\favicon.ico"
                  & $ahk2exe /in $input /out $output /icon $icon
                  if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              shell: pwsh

            - name: Commit and push compiled EXE
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add static/drivers/autohotkey/ErgoptiPlus.exe
                  git diff --cached --quiet && echo "No changes to commit" || git commit -m "ci: recompile ErgoptiPlus.exe"
                  git push
              shell: bash

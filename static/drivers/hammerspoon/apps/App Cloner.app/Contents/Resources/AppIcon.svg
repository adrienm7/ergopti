<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
	<!--
		AppCloner icon — three overlapping rounded squares in red, green, blue,
		stacked diagonally on a dark slate background. Visual metaphor: the same
		app cloned in multiple tinted colours, which is exactly what the tool
		does. The translucent stack reads from any size (Dock 32 px → Finder
		1024 px) and remains balanced because the shapes share a common centre.
	-->
	<defs>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
			<feOffset dx="0" dy="10" result="offsetblur"/>
			<feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
			<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
		</filter>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#2A3142"/>
			<stop offset="1" stop-color="#1B2030"/>
		</linearGradient>
	</defs>

	<!-- App-icon shaped background -->
	<rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

	<!-- Three tinted clones, staggered. Same shape, different hues — the
		 visual metaphor for what AppCloner produces. -->
	<g filter="url(#shadow)">
		<!-- Back clone: red, top-left -->
		<rect x="180" y="180" width="500" height="500" rx="110" ry="110"
		      fill="#E74C3C" opacity="0.95"/>
		<!-- Middle clone: green -->
		<rect x="262" y="262" width="500" height="500" rx="110" ry="110"
		      fill="#2ECC71" opacity="0.95"/>
		<!-- Front clone: blue, bottom-right -->
		<rect x="344" y="344" width="500" height="500" rx="110" ry="110"
		      fill="#3498DB" opacity="0.95"/>
	</g>

	<!-- Subtle highlight on the front clone for depth -->
	<rect x="344" y="344" width="500" height="160" rx="110" ry="110"
	      fill="#FFFFFF" opacity="0.10"/>
</svg>
